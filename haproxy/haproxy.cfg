global
    log /dev/log    local0
    log /dev/log    local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

    ca-base /etc/ssl/certs
    crt-base /etc/ssl/private

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  forwardfor
    option  http-server-close
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats realm HAProxy\ Statistics
    stats auth admin:medimesh2026
    stats refresh 10s

frontend medimesh_http
    bind *:80
    default_backend medimesh_k8s_nodes

backend medimesh_k8s_nodes
    balance roundrobin
    option tcp-check
    server master  <MASTER_PRIVATE_IP>:30790  check inter 5s fall 3 rise 1
    server worker1 <WORKER1_PRIVATE_IP>:30790 check inter 5s fall 3 rise 1
    server worker2 <WORKER2_PRIVATE_IP>:30790 check inter 5s fall 3 rise 1
