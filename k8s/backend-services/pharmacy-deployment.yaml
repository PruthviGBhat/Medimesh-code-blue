# ════════════════════════════════════════════════════════════
# MediMesh — Pharmacy Service Deployment
# ════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medimesh-pharmacy
  namespace: medimesh
  labels:
    app: medimesh-pharmacy
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medimesh-pharmacy
      tier: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: medimesh-pharmacy
        tier: backend
    spec:
      containers:
        - name: medimesh-pharmacy
          image: bharath44623/medimesh_medimesh-pharmacy:v1.1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 5006
              name: http
          env:
            - name: PORT
              value: "5006"
             - name: MONGO_URI
               value: "mongodb://medimesh-mongodb-0.medimesh-mongodb:27017/medimesh-pharmacy-db?replicaSet=rs0"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: medimesh-secrets
                  key: JWT_SECRET
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: medimesh-config
                  key: NODE_ENV
          # ─── Health Probes ──────────────────────────────────
          readinessProbe:
            httpGet:
              path: /health
              port: 5006
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5006
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
