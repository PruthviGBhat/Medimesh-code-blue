apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: medimesh-mongodb
  namespace: medimesh
  labels:
    app: medimesh-mongodb
    tier: database
spec:
  serviceName: medimesh-mongodb
  replicas: 1
  selector:
    matchLabels:
      app: medimesh-mongodb
      tier: database
  template:
    metadata:
      labels:
        app: medimesh-mongodb
        tier: database
    spec:
      containers:
      - name: mongodb
        image: mongo:7
        ports:
        - containerPort: 27017
          name: mongo
        command:
        - mongod
        - --replSet
        - rs0
        - --bind_ip_all
        volumeMounts:
        - name: mongodb-data
          mountPath: /data/db
        readinessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 30
          periodSeconds: 20
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: mongodb-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: medimesh-mongodb
  namespace: medimesh
  labels:
    app: medimesh-mongodb
    tier: database
spec:
  clusterIP: None
  selector:
    app: medimesh-mongodb
    tier: database
  ports:
  - port: 27017
    targetPort: 27017
    name: mongo