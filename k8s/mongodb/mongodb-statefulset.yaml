# ════════════════════════════════════════════════════════════
# MediMesh — MongoDB 3-Node ReplicaSet StatefulSet
# ════════════════════════════════════════════════════════════
# Deploys a 3-member MongoDB ReplicaSet for high availability
# and automatic data replication across pods.
#
# Each pod gets its own NFS-backed PVC via volumeClaimTemplates.
# The NFS provisioner (nfs-dynamic StorageClass) auto-creates
# PVs — no hostPath, no nodeAffinity, no taints needed.
#
# Pods created (stable DNS via headless service):
#   medimesh-mongodb-0.medimesh-mongodb.medimesh.svc.cluster.local
#   medimesh-mongodb-1.medimesh-mongodb.medimesh.svc.cluster.local
#   medimesh-mongodb-2.medimesh-mongodb.medimesh.svc.cluster.local
#
# ⚠️  IMPORTANT: After all 3 pods are Running, apply the
#    ReplicaSet init Job to run rs.initiate():
#    kubectl apply -f k8s/mongodb/mongodb-rs-init-job.yaml
# ════════════════════════════════════════════════════════════

# ─── Headless Service (required for StatefulSet DNS) ──────
apiVersion: v1
kind: Service
metadata:
  name: medimesh-mongodb
  namespace: medimesh
  labels:
    app: medimesh-mongodb
    tier: database
spec:
  clusterIP: None
  selector:
    app: medimesh-mongodb
    tier: database
  ports:
    - port: 27017
      targetPort: 27017
      name: mongo

---
# ─── StatefulSet (3-Member ReplicaSet) ────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: medimesh-mongodb
  namespace: medimesh
  labels:
    app: medimesh-mongodb
    tier: database
spec:
  serviceName: medimesh-mongodb
  replicas: 1
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: medimesh-mongodb
      tier: database
  template:
    metadata:
      labels:
        app: medimesh-mongodb
        tier: database
    spec:
      # ─── Allow scheduling on master node if needed ────────
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule

      containers:
        - name: mongodb
          image: mongo:7
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 27017
              name: mongo
          # ─── Start mongod with ReplicaSet enabled ──────────
          command:
            - mongod
            - "--replSet"
            - "rs0"
            - "--bind_ip_all"
          # ─── Environment (for diagnostics) ──────────────────
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
           # ─── Health Probes ─────────────────────────────────
           readinessProbe:
             exec:
               command:
                 - mongosh
                 - --quiet
                 - --eval
                 - "db.adminCommand('ping')"
             initialDelaySeconds: 10
             periodSeconds: 10
             timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
           volumeMounts:
             - name: mongodb-data
               mountPath: /data/db
           resources:
             requests:
               memory: "256Mi"
               cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: mongodb-data
          emptyDir: {}
