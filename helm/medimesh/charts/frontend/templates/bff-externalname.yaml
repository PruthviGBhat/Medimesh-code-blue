# DNS alias so nginx in frontend namespace can resolve "medimesh-bff-svc"
apiVersion: v1
kind: Service
metadata:
  name: medimesh-bff-svc
  namespace: {{ .Values.global.namespaces.frontend }}
  labels:
    app: medimesh-bff-svc
    tier: frontend
    app.kubernetes.io/part-of: medimesh
spec:
  type: ExternalName
  externalName: medimesh-bff-svc.{{ .Values.global.namespaces.backend }}.svc.cluster.local
