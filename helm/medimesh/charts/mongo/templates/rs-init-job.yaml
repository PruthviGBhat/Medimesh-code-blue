# MongoDB Single Node Verification Job
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.rsInitJob.name }}
  namespace: {{ .Values.global.namespaces.db }}
  labels:
    app: {{ .Values.name }}
    tier: database
    component: rs-init
spec:
  backoffLimit: {{ .Values.rsInitJob.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.rsInitJob.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
        tier: database
        component: rs-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mongo-rs-init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - bash
            - -c
            - |
              set -e
              echo "═══════════════════════════════════════════════"
              echo "  MediMesh — MongoDB Single Node Verification"
              echo "═══════════════════════════════════════════════"
              echo ""

              # ── Step 1: Wait for MongoDB pod ────────────
              HOST="{{ .Values.name }}-0.{{ .Values.name }}.{{ .Values.global.namespaces.db }}.svc.cluster.local"
              
              echo "📡 Step 1: Waiting for MongoDB pod to be reachable..."
              echo -n "  Checking $HOST..."
              RETRY=0
              MAX_RETRY=60
              until mongosh --host "$HOST" --port {{ .Values.containerPort }} --quiet \
                    --eval "db.adminCommand('ping')" &>/dev/null; do
                RETRY=$((RETRY + 1))
                if [ $RETRY -ge $MAX_RETRY ]; then
                  echo " FAILED after $MAX_RETRY attempts!"
                  exit 1
                fi
                echo -n "."
                sleep 3
              done
              echo " ✅ Ready"
              echo ""

              # ── Step 2: Print final status ──────────────────────
              echo "📊 Step 2: Final MongoDB Status:"
              echo "─────────────────────────────────────────"
              mongosh \
                --host "{{ .Values.name }}-0.{{ .Values.name }}.{{ .Values.global.namespaces.db }}.svc.cluster.local" \
                --port {{ .Values.containerPort }} --quiet --eval "
                  try {
                    var s = rs.status();
                    print('ReplicaSet Name: ' + s.set);
                    print('Members:');
                    s.members.forEach(function(m) {
                      print('  [' + m._id + '] ' + m.name + ' → ' + m.stateStr);
                    });
                  } catch(e) {
                    // If not a replicaset, just check server status
                    print('MongoDB Server Status:');
                    print('  Connected successfully to single node');
                  }
                "
              echo "─────────────────────────────────────────"
              echo ""

              echo "═══════════════════════════════════════════════"
              echo "  ✅ MongoDB single node verification completed successfully!"
              echo ""
              echo "  Connection String (for apps):"
              echo "  mongodb://{{ .Values.name }}-0.{{ .Values.name }}.{{ .Values.global.namespaces.db }}.svc.cluster.local:{{ .Values.containerPort }}/<db>"
              echo "════════════════════════════════════════════════"
          resources:
            requests:
              cpu: {{ .Values.rsInitJob.resources.requests.cpu | quote }}
              memory: {{ .Values.rsInitJob.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.rsInitJob.resources.limits.cpu | quote }}
              memory: {{ .Values.rsInitJob.resources.limits.memory | quote }}