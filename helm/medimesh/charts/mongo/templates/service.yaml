# MongoDB Headless Service
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.name }}
  namespace: {{ .Values.global.namespaces.db }}
  labels:
    app: {{ .Values.name }}
    tier: database
spec:
  clusterIP: None
  selector:
    app: {{ .Values.name }}
    tier: database
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      name: mongo
